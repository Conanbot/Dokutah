<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pendaftaran - Dokutah</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px 0;
        }

        .registration-container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            max-width: 500px;
            width: 100%;
            padding: 40px;
        }

        .registration-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .registration-header h1 {
            color: #667eea;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .registration-header p {
            color: #666;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            color: #333;
            font-weight: 600;
            margin-bottom: 8px;
            display: block;
        }

        .form-group input,
        .form-group textarea {
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            padding: 12px 15px;
            font-size: 14px;
            transition: all 0.3s;
            width: 100%;
            font-family: inherit;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
            outline: none;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        .btn-register {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            margin-top: 10px;
            transition: all 0.3s;
            cursor: pointer;
        }

        .btn-register:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
            color: white;
        }

        .form-check {
            margin-bottom: 20px;
        }

        .form-check input {
            border: 2px solid #e0e0e0;
            border-radius: 4px;
        }

        .form-check input:checked {
            background-color: #667eea;
            border-color: #667eea;
        }

        .form-check label {
            color: #666;
            font-size: 14px;
            margin-bottom: 0;
            margin-left: 5px;
        }

        .form-check a {
            color: #667eea;
            text-decoration: none;
        }

        .form-check a:hover {
            text-decoration: underline;
        }

        .error-message {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 20px;
            display: none;
        }

        .success-message {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 20px;
            display: none;
        }

        .login-link {
            text-align: center;
            color: #666;
            font-size: 14px;
            margin-top: 20px;
        }

        .login-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }

        .login-link a:hover {
            text-decoration: underline;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        @media (max-width: 576px) {
            .registration-container {
                padding: 30px 20px;
                margin: 20px;
            }

            .form-row {
                grid-template-columns: 1fr;
            }
        }

        .password-strength {
            font-size: 12px;
            margin-top: 5px;
        }

        .password-strength-bar {
            height: 4px;
            border-radius: 2px;
            background-color: #e0e0e0;
            overflow: hidden;
            margin-top: 5px;
        }

        .password-strength-fill {
            height: 100%;
            width: 0%;
            transition: all 0.3s;
        }

        .strength-weak {
            background-color: #dc3545;
        }

        .strength-medium {
            background-color: #ffc107;
        }

        .strength-strong {
            background-color: #28a745;
        }
    </style>
</head>
<body>
    <div class="registration-container">
        <div class="registration-header">
            <h1><i class="fas fa-hospital me-2"></i>DOKUTAH</h1>
            <p>Buat akun baru Anda</p>
        </div>

        <div class="error-message" id="errorMessage"></div>
        <div class="success-message" id="successMessage"></div>

        <form id="registrationForm">
            <div class="form-group">
                <label for="bpjs"><i class="fas fa-id-card me-2"></i>Nomor BPJS</label>
                <input 
                    type="text" 
                    class="form-control" 
                    id="bpjs" 
                    name="bpjs" 
                    placeholder="Contoh: 0001234567890012"
                    required
                >
                <small class="text-muted">16 digit nomor BPJS Anda</small>
            </div>

            <div class="form-group">
                <label for="fullname"><i class="fas fa-user me-2"></i>Nama Lengkap</label>
                <input 
                    type="text" 
                    class="form-control" 
                    id="fullname" 
                    name="fullname" 
                    placeholder="Masukkan nama lengkap Anda"
                    required
                >
            </div>

            <div class="form-group">
                <label for="email"><i class="fas fa-envelope me-2"></i>Email</label>
                <input 
                    type="email" 
                    class="form-control" 
                    id="email" 
                    name="email" 
                    placeholder="Masukkan email Anda"
                    required
                >
            </div>

            <div class="form-group">
                <label for="address"><i class="fas fa-map-marker-alt me-2"></i>Alamat</label>
                <textarea 
                    class="form-control" 
                    id="address" 
                    name="address" 
                    placeholder="Masukkan alamat lengkap Anda"
                    required
                ></textarea>
            </div>

            <div class="form-group">
                <label for="password"><i class="fas fa-lock me-2"></i>Password</label>
                <input 
                    type="password" 
                    class="form-control" 
                    id="password" 
                    name="password" 
                    placeholder="Buat password yang kuat"
                    required
                >
                <div class="password-strength-bar">
                    <div class="password-strength-fill" id="passwordStrengthFill"></div>
                </div>
                <div class="password-strength" id="passwordStrengthText"></div>
                <small class="text-muted d-block mt-2">
                    <i class="fas fa-info-circle"></i> Password minimal 8 karakter, harus mengandung huruf dan angka
                </small>
            </div>

            <div class="form-check">
                <input 
                    class="form-check-input" 
                    type="checkbox" 
                    id="agreeTos" 
                    name="agreeTos"
                    required
                >
                <label class="form-check-label" for="agreeTos">
                    Saya setuju dengan <a href="#">Syarat dan Ketentuan</a> serta <a href="#">Kebijakan Privasi</a>
                </label>
            </div>

            <button type="submit" class="btn-register">
                <i class="fas fa-user-plus me-2"></i>Daftar
            </button>
        </form>

        <div class="login-link">
            Sudah punya akun? <a href="login.html"><i class="fas fa-sign-in-alt me-1"></i>Masuk di sini</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Password strength checker
        document.getElementById('password').addEventListener('input', function() {
            const password = this.value;
            const strength = checkPasswordStrength(password);
            updatePasswordStrength(strength);
        });

        function checkPasswordStrength(password) {
            let strength = 0;

            if (password.length >= 8) strength++;
            if (password.length >= 12) strength++;
            if (/[a-z]/.test(password)) strength++;
            if (/[A-Z]/.test(password)) strength++;
            if (/[0-9]/.test(password)) strength++;
            if (/[^a-zA-Z0-9]/.test(password)) strength++;

            return strength;
        }

        function updatePasswordStrength(strength) {
            const fill = document.getElementById('passwordStrengthFill');
            const text = document.getElementById('passwordStrengthText');
            const percentage = (strength / 6) * 100;

            fill.style.width = percentage + '%';

            if (strength <= 2) {
                fill.className = 'password-strength-fill strength-weak';
                text.textContent = 'Kekuatan: Lemah';
                text.style.color = '#dc3545';
            } else if (strength <= 4) {
                fill.className = 'password-strength-fill strength-medium';
                text.textContent = 'Kekuatan: Sedang';
                text.style.color = '#ffc107';
            } else {
                fill.className = 'password-strength-fill strength-strong';
                text.textContent = 'Kekuatan: Kuat';
                text.style.color = '#28a745';
            }
        }

        document.getElementById('registrationForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const bpjs = document.getElementById('bpjs').value.trim();
            const fullname = document.getElementById('fullname').value.trim();
            const email = document.getElementById('email').value.trim();
            const address = document.getElementById('address').value.trim();
            const password = document.getElementById('password').value;
            const agreeTos = document.getElementById('agreeTos').checked;

            // Reset messages
            document.getElementById('errorMessage').style.display = 'none';
            document.getElementById('successMessage').style.display = 'none';

            // Validasi input
            if (!bpjs || !fullname || !email || !address || !password) {
                showError('Harap isi semua field');
                return;
            }

            if (!isValidBPJS(bpjs)) {
                showError('Nomor BPJS harus 16 digit');
                return;
            }

            if (fullname.length < 3) {
                showError('Nama lengkap minimal 3 karakter');
                return;
            }

            if (!isValidEmail(email)) {
                showError('Format email tidak valid');
                return;
            }

            if (address.length < 10) {
                showError('Alamat minimal 10 karakter');
                return;
            }

            if (password.length < 8) {
                showError('Password minimal 8 karakter');
                return;
            }

            if (!/[0-9]/.test(password)) {
                showError('Password harus mengandung minimal 1 angka');
                return;
            }

            if (!/[a-zA-Z]/.test(password)) {
                showError('Password harus mengandung minimal 1 huruf');
                return;
            }

            if (!agreeTos) {
                showError('Anda harus menyetujui syarat dan ketentuan');
                return;
            }

            // Kirim ke server (ganti dengan endpoint API Anda)
            console.log('Registration attempt:', { bpjs, fullname, email, address, password });
            
            showSuccess('Pendaftaran berhasil! Silakan cek email Anda untuk verifikasi.');
            
            // Reset form
            this.reset();
            document.getElementById('passwordStrengthFill').style.width = '0%';
            document.getElementById('passwordStrengthText').textContent = '';

            // Redirect after 2 seconds
            setTimeout(() => {
                // window.location.href = 'login.html';
            }, 2000);
        });

        function isValidBPJS(bpjs) {
            // Remove spaces and check if it's 16 digits
            const cleanBPJS = bpjs.replace(/\s/g, '');
            return /^\d{16}$/.test(cleanBPJS);
        }

        function isValidEmail(email) {
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return emailRegex.test(email);
        }

        function showError(message) {
            const errorElement = document.getElementById('errorMessage');
            errorElement.textContent = message;
            errorElement.style.display = 'block';
            errorElement.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            setTimeout(() => {
                errorElement.style.display = 'none';
            }, 5000);
        }

        function showSuccess(message) {
            const successElement = document.getElementById('successMessage');
            successElement.textContent = message;
            successElement.style.display = 'block';
            successElement.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }
    </script>
</body>
</html>
